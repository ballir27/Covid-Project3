services:
  airflow:
    build:
      context: .
      dockerfile: Dockerfile

    user: "root:root"

    command:
      - bash
      - -lc
      - |
        mkdir -p /opt/airflow/airflow_home/logs \
                 /opt/airflow/airflow_home/dags \
                 /opt/airflow/airflow_home/plugins \
                 /home/airflow/.snowflake \
                 /tmp/cosmos &&
        chown -R airflow:root /opt/airflow/airflow_home /home/airflow/.snowflake /tmp/cosmos &&
        chmod -R g+rwX /opt/airflow/airflow_home /home/airflow/.snowflake /tmp/cosmos &&
        rm -f /opt/airflow/airflow_home/airflow-webserver.pid \
              /opt/airflow/airflow_home/airflow-scheduler.pid \
              /opt/airflow/airflow_home/airflow-triggerer.pid &&
        exec su -p -s /bin/bash airflow -c 'PATH="/home/airflow/.local/bin:/opt/airflow/dbt_venv/bin:$PATH" && export PATH && /home/airflow/.local/bin/airflow standalone'

    ports:
      - "8080:8080"

    env_file:
      - ./.env

    environment:
      # Core Airflow config
      AIRFLOW_HOME: /opt/airflow/airflow_home
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__PARALLELISM: 32
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: 16

      # Webserver (fixes your CSRF + login issues)
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}

      # Create admin user automatically
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD}
      _AIRFLOW_WWW_USER_FIRSTNAME: ${AIRFLOW_FIRSTNAME}
      _AIRFLOW_WWW_USER_LASTNAME: ${AIRFLOW_LASTNAME}
      _AIRFLOW_WWW_USER_EMAIL: ${AIRFLOW_EMAIL}


      # Your project path (VERY important for imports)
      HOME: /home/airflow
      PYTHONPATH: /opt/airflow/workspace/src
      PATH: /home/airflow/.local/bin:/opt/airflow/dbt_venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      SNOWFLAKE_HOME: /home/airflow/.snowflake

      # dbt / Cosmos runtime config
      DBT_PROJECT_DIR: /opt/airflow/workspace/covid_dbt
      DBT_PROFILE_NAME: covid_project3_dbt
      DBT_TARGET_NAME: ${DBT_TARGET_NAME:-dev}
      DBT_PROFILES_FILE: /home/airflow/.dbt/profiles.yml
      DBT_EXECUTABLE_PATH: /opt/airflow/workspace/scripts/dbt_safe.sh

    volumes:
      # Airflow metadata (DB, sessions) without masking image-installed Python packages
      - airflow_home:/opt/airflow/airflow_home

      # Your project code
      - .:/opt/airflow/workspace

      # DAGs + logs
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs

      # dbt profiles
      - ${HOME}/.dbt:/home/airflow/.dbt:ro

      # AWS creds (optional)
      - ${HOME}/.aws:/home/airflow/.aws:ro

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  airflow_home: