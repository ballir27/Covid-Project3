services:
  airflow:
    build:
      context: .
      dockerfile: Dockerfile
    # Ensures compatibility with Apple Silicon (M1/M2/M3)
    platform: linux/amd64 
    command: standalone
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    environment:
      AIRFLOW_HOME: /home/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__PARALLELISM: 32
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: 16
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD}
      _AIRFLOW_WWW_USER_FIRSTNAME: ${AIRFLOW_FIRSTNAME}
      _AIRFLOW_WWW_USER_LASTNAME: ${AIRFLOW_LASTNAME}
      _AIRFLOW_WWW_USER_EMAIL: ${AIRFLOW_EMAIL}
      PYTHONPATH: /opt/airflow/workspace/src
      # Fixes permission issues on Windows/Mac volumes
      _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    volumes:
      - airflow_home:/home/airflow
      - .:/opt/airflow/workspace
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      # Use a conditional or relative path for AWS to avoid Windows path errors
      - ${HOME:-~}/.aws:/home/airflow/.aws:ro
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  airflow_home: